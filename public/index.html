<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp Inbox — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 28px;
  }
  .logo svg { width: 36px; height: 36px; }
  .logo span { font-size: 18px; font-weight: 700; color: #111827; }
  label { display: block; font-size: 13px; font-weight: 600;
          color: #374151; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #25d366; }
  .field { margin-bottom: 18px; }
  button {
    width: 100%; padding: 11px; background: #25d366; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  button:hover { background: #128c3e; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  .error {
    background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .company { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#25d366"/>
      <path d="M16 6C10.477 6 6 10.477 6 16c0 1.89.525 3.656 1.437 5.165L6 26l4.97-1.42A9.953 9.953 0 0016 26c5.523 0 10-4.477 10-10S21.523 6 16 6z" fill="white"/>
      <path d="M13.5 12c-.28 0-.73.1-1.11.52-.38.43-1.39 1.36-1.39 3.31s1.43 3.84 1.63 4.1c.2.27 2.77 4.48 6.82 6.1.95.37 1.69.59 2.27.76.95.27 1.82.23 2.5.14.77-.1 2.36-.96 2.69-1.89.34-.93.34-1.72.24-1.89-.1-.17-.38-.27-.8-.47-.4-.2-2.36-1.17-2.73-1.3-.38-.14-.65-.2-.93.2-.28.4-1.08 1.3-1.32 1.56-.24.27-.48.31-.9.1-.42-.2-1.78-.66-3.39-2.1-1.25-1.12-2.1-2.5-2.34-2.93-.24-.42-.03-.65.18-.86.19-.19.42-.48.63-.72.2-.24.27-.4.4-.66.14-.27.07-.5-.03-.7-.1-.2-.93-2.24-1.27-3.06-.33-.8-.68-.7-.93-.71z" fill="#25d366"/>
    </svg>
    <span>WhatsApp Inbox</span>
  </div>

  <div class="error" id="error-box"></div>

  <form id="login-form">
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="recruiter@ctigroup.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" id="submit-btn">Sign In</button>
  </form>

  <p class="company">CTI Group Worldwide Services Inc.</p>
</div>

<script>
  const form    = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');
  const submitBtn = document.getElementById('submit-btn');

  // Redirect if already logged in
  if (localStorage.getItem('wb_token')) window.location.href = '/dashboard.html';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Login failed');

      localStorage.setItem('wb_token', data.token);
      localStorage.setItem('wb_agent', JSON.stringify(data.agent));
      window.location.href = '/dashboard.html';

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
