<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTI Chat Portal — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh;
  }
  .card {
    background: #fff; border-radius: 12px; padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  .logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 28px;
  }
  .logo svg { width: 36px; height: 36px; }
  .logo span { font-size: 18px; font-weight: 700; color: #111827; }
  label { display: block; font-size: 13px; font-weight: 600;
          color: #374151; margin-bottom: 6px; }
  input {
    width: 100%; padding: 10px 14px; border: 1.5px solid #d1d5db;
    border-radius: 8px; font-size: 14px; outline: none;
    transition: border-color .2s;
  }
  input:focus { border-color: #2563eb; }
  .field { margin-bottom: 18px; }
  button {
    width: 100%; padding: 11px; background: #2563eb; color: #fff;
    border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s;
  }
  button:hover { background: #1d4ed8; }
  button:disabled { background: #9ca3af; cursor: not-allowed; }
  .error {
    background: #fef2f2; color: #dc2626; border: 1px solid #fecaca;
    border-radius: 8px; padding: 10px 14px; font-size: 13px;
    margin-bottom: 16px; display: none;
  }
  .company { text-align: center; font-size: 12px; color: #9ca3af; margin-top: 20px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="32" height="32" rx="8" fill="#2563eb"/>
      <path d="M9 11a2 2 0 012-2h10a2 2 0 012 2v7a2 2 0 01-2 2h-6.5L11 23v-3H11a2 2 0 01-2-2v-7z" fill="white"/>
    </svg>
    <span>CTI Chat Portal</span>
  </div>

  <div class="error" id="error-box"></div>

  <form id="login-form">
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="recruiter@ctigroup.com" required autocomplete="email">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" id="submit-btn">Sign In</button>
  </form>

  <p class="company">CTI Group Worldwide Services Inc.</p>
</div>

<script>
  const form    = document.getElementById('login-form');
  const errorBox = document.getElementById('error-box');
  const submitBtn = document.getElementById('submit-btn');

  // Redirect if already logged in
  if (localStorage.getItem('wb_token')) window.location.href = '/dashboard.html';

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email:    document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.error ?? 'Login failed');

      localStorage.setItem('wb_token', data.token);
      localStorage.setItem('wb_agent', JSON.stringify(data.agent));
      window.location.href = '/dashboard.html';

    } catch (err) {
      errorBox.textContent = err.message;
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign In';
    }
  });
</script>
</body>
</html>
